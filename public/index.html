<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mindset Unblocker — by Nordic Edge</title>
  <meta name="description" content="Discover the hidden belief holding you back. A 5-minute guided reflection by Nordic Edge.">
  <meta property="og:title" content="Mindset Unblocker">
  <meta property="og:description" content="Discover the hidden belief holding you back. Reframe it. Move forward.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
  <style>
    /* ============================================================
       Nordic Edge brand tokens (translated from the design system's
       Tailwind v4 @theme into plain CSS for this static app).
       ============================================================ */
    @font-face {
      font-family: "Sohne Breit";
      src: url("/fonts/SohneBreit-Buch.woff2") format("woff2");
      font-weight: 400; font-style: normal; font-display: swap;
    }
    @font-face {
      font-family: "Anton";
      src: url("/fonts/Anton-Regular.ttf") format("truetype");
      font-weight: 400; font-style: normal; font-display: swap;
    }

    :root {
      /* Palette — exactly six. Text + marks are always dark-blue or white. */
      --dark-blue: #230064;
      --ice-blue: #c8e1ff;
      --hot-pink: #ff3787;
      --orange-peach: #ff823c;
      --powder-pink: #ffc8c8;
      --white: #ffffff;

      /* Text tiers on light backgrounds */
      --fg: #230064;
      --fg-muted: rgb(35 0 100 / 0.65);
      --fg-subtle: rgb(35 0 100 / 0.50);
      --border: rgb(35 0 100 / 0.10);

      /* Type — three families, one role each */
      --font-headline: "Sohne Breit", "Anton", sans-serif;
      --font-subheading: "Anton", sans-serif;
      --font-body: "Geist", system-ui, -apple-system, "Segoe UI", sans-serif;

      --tracking-eyebrow: 0.18em;
      --radius-card: 1.5rem; /* 24px */
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-body);
      background: var(--white);
      color: var(--fg);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* one-shot, restrained */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    /* functional typing loader — opacity only (no scale/bounce per brand) */
    @keyframes pulseOpacity {
      0%, 80%, 100% { opacity: 0.25; }
      40% { opacity: 1; }
    }

    /* N-cut triangle — the signature brand graphic (currentColor) */
    .ncut { display: inline-block; fill: currentColor; }

    /* Eyebrow label */
    .eyebrow {
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: var(--tracking-eyebrow);
    }

    /* ---- LANDING (sharp, full-bleed dark-blue hero) ---- */
    #landing {
      min-height: 100vh;
      background: var(--dark-blue);
      color: var(--white);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }

    #landing .mark {
      color: var(--hot-pink);
      margin-bottom: 32px;
      animation: fadeIn 0.6s ease-out;
    }
    #landing .mark .ncut { width: 30px; height: auto; }

    #landing .eyebrow {
      color: var(--hot-pink);
      margin-bottom: 18px;
      animation: fadeIn 0.6s ease-out 0.1s both;
    }

    #landing h1 {
      font-family: var(--font-headline);
      font-weight: 400;
      font-size: clamp(34px, 6vw, 60px);
      line-height: 1.05;
      letter-spacing: -0.01em;
      margin-bottom: 16px;
      animation: fadeIn 0.6s ease-out 0.15s both;
    }

    #landing .subtitle {
      font-size: 18px;
      color: rgb(255 255 255 / 0.70);
      max-width: 440px;
      line-height: 1.6;
      margin-bottom: 48px;
      animation: fadeIn 0.6s ease-out 0.25s both;
    }

    .lang-buttons {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
      animation: fadeIn 0.6s ease-out 0.35s both;
    }

    /* Pill buttons */
    .btn {
      font-family: var(--font-body);
      font-size: 16px;
      font-weight: 600;
      padding: 16px 40px;
      border-radius: 999px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: background-color 160ms ease, color 160ms ease, border-color 160ms ease;
    }
    /* secondary = hot-pink, inverts to white on hover */
    .btn-secondary {
      background: var(--hot-pink);
      color: var(--white);
      border-color: var(--hot-pink);
    }
    .btn-secondary:hover {
      background: var(--white);
      color: var(--dark-blue);
      border-color: var(--white);
    }
    /* outline (on dark) = white border, inverts to white fill */
    .btn-outline-light {
      background: transparent;
      color: var(--white);
      border-color: var(--white);
    }
    .btn-outline-light:hover {
      background: var(--white);
      color: var(--dark-blue);
    }

    #landing .footer-note {
      font-size: 13px;
      color: rgb(255 255 255 / 0.50);
      margin-top: 56px;
      animation: fadeIn 0.6s ease-out 0.5s both;
    }

    /* ---- CHAT (light) ---- */
    #chat {
      display: none;
      flex-direction: column;
      height: 100vh;
      background: var(--white);
    }
    #chat.active { display: flex; }

    .chat-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--white);
    }

    .chat-header .logo-area {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--dark-blue);
    }
    .chat-header .mark .ncut { width: 13px; height: auto; color: var(--hot-pink); }

    .chat-header .title {
      font-family: var(--font-headline);
      font-size: 17px;
      font-weight: 400;
      letter-spacing: -0.01em;
    }

    .reset-btn {
      background: none;
      border: none;
      color: var(--fg-muted);
      cursor: pointer;
      font-size: 13px;
      font-family: var(--font-body);
      padding: 6px 8px;
      transition: color 160ms ease;
    }
    .reset-btn:hover { color: var(--hot-pink); }

    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 28px 20px;
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
    }

    .message {
      display: flex;
      margin-bottom: 16px;
      animation: fadeIn 0.3s ease-out;
    }
    .message.user { justify-content: flex-end; }
    .message.assistant { justify-content: flex-start; }

    .message .bubble {
      max-width: 82%;
      padding: 16px 20px;
      font-size: 16px;
      line-height: 1.6;
      white-space: pre-wrap;
      color: var(--dark-blue);
    }

    /* assistant = ice-blue card; user = powder-pink card. Both dark-blue text. */
    .message.assistant .bubble {
      background: var(--ice-blue);
      border-radius: var(--radius-card) var(--radius-card) var(--radius-card) 6px;
    }
    .message.user .bubble {
      background: var(--powder-pink);
      border-radius: var(--radius-card) var(--radius-card) 6px var(--radius-card);
    }

    .bubble strong { font-weight: 700; color: var(--dark-blue); }

    .typing {
      display: flex;
      gap: 6px;
      padding: 14px 0;
      align-items: center;
    }
    .typing .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--hot-pink);
      animation: pulseOpacity 1.4s ease-in-out infinite;
    }
    .typing .dot:nth-child(2) { animation-delay: 0.2s; }
    .typing .dot:nth-child(3) { animation-delay: 0.4s; }

    .error-msg {
      padding: 12px 16px 12px 18px;
      background: var(--powder-pink);
      border-left: 3px solid var(--hot-pink);
      border-radius: 8px;
      color: var(--dark-blue);
      font-size: 14px;
      margin-bottom: 12px;
    }

    .input-area {
      padding: 16px 20px 24px;
      border-top: 1px solid var(--border);
      background: var(--white);
    }

    .input-row {
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }

    .input-row textarea {
      flex: 1;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 13px 16px;
      color: var(--dark-blue);
      font-size: 16px;
      font-family: var(--font-body);
      line-height: 1.5;
      resize: none;
      min-height: 46px;
      max-height: 130px;
      overflow: auto;
      transition: border-color 160ms ease;
    }
    .input-row textarea::placeholder { color: var(--fg-subtle); }
    .input-row textarea:focus {
      outline: none;
      border-color: var(--hot-pink);
    }

    /* send = circular pill, dark-blue, thin (1.5) arrow */
    .send-btn {
      background: var(--dark-blue);
      border: none;
      color: var(--white);
      width: 46px;
      height: 46px;
      border-radius: 999px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background-color 160ms ease;
      flex-shrink: 0;
    }
    .send-btn:hover:not(:disabled) { background: var(--hot-pink); }
    .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .input-footer {
      text-align: center;
      font-size: 12px;
      color: var(--fg-subtle);
      margin-top: 12px;
    }

    @media (max-width: 480px) {
      .btn { padding: 15px 32px; font-size: 16px; }
      .lang-buttons { flex-direction: column; width: 100%; max-width: 320px; }
      .messages-area { padding: 18px 12px; }
      .message .bubble { max-width: 90%; }
    }
  </style>
</head>
<body>

<!-- LANDING SCREEN -->
<div id="landing">
  <div class="mark">
    <svg class="ncut" viewBox="0 0 34.68 169.87" aria-hidden="true"><polygon points="0 169.87 34.68 169.87 0 0 0 169.87"></polygon></svg>
  </div>
  <p class="eyebrow">A 5-minute reflection</p>
  <h1>Mindset Unblocker</h1>
  <p class="subtitle">
    Discover the hidden belief holding you back.<br>
    Reframe it. Move forward.
  </p>
  <div class="lang-buttons">
    <button class="btn btn-secondary" onclick="startChat('en')">English</button>
    <button class="btn btn-outline-light" onclick="startChat('fi')">Suomeksi</button>
  </div>
  <p class="footer-note">Powered by Nordic Edge</p>
</div>

<!-- CHAT SCREEN -->
<div id="chat">
  <div class="chat-header">
    <div class="logo-area">
      <span class="mark">
        <svg class="ncut" viewBox="0 0 34.68 169.87" aria-hidden="true"><polygon points="0 169.87 34.68 169.87 0 0 0 169.87"></polygon></svg>
      </span>
      <span class="title">Mindset Unblocker</span>
    </div>
    <button class="reset-btn" onclick="resetAll()">
      <span id="resetLabel">Start over</span>
    </button>
  </div>
  <div class="messages-area" id="messagesArea"></div>
  <div class="input-area">
    <div class="input-row">
      <textarea
        id="userInput"
        rows="1"
        placeholder="Share your thoughts here..."
        oninput="autoResize(this)"
        onkeydown="handleKey(event)"
      ></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"/>
          <polyline points="12 5 19 12 12 19"/>
        </svg>
      </button>
    </div>
    <p class="input-footer" id="inputFooter">Powered by Nordic Edge · Your responses are confidential</p>
  </div>
</div>

<script>
// ---- STATE ----
let currentLang = null;
let messages = []; // conversation history for API
let isLoading = false;

// ---- SYSTEM PROMPTS ----
const SYSTEM_EN = `You are "Mindset Unblocker" — a warm, wise, and direct coaching companion that helps people identify and reframe limiting beliefs rooted in scarcity mindset toward an abundance mindset.

Your approach is grounded in Carol Dweck's Growth Mindset research, Lisa Lahey's Immunity to Change framework, and the SHIFT method. However, you NEVER reveal these frameworks, methods, or sources to the user — even if directly asked. If asked what content or methods you use, deflect warmly: "I'm here to focus on you and your thinking — that's what matters most right now."

You guide the user through a focused discovery exercise, ONE question at a time. Never rush ahead. Never present multiple questions at once. Wait for the user's response before moving to the next step.

IMPORTANT RULES:
- Ask ONE question at a time only
- Do NOT include framework step names or labels in your messages
- Do NOT reveal your sources, frameworks, or methodology
- Keep responses warm but concise — no long paragraphs
- Use the abundance mindset to reframe scarcity thinking
- Generate success mantras that are inspiring, catchy, and memorable
- Be encouraging but not patronizing

STARTING SEQUENCE (use this exactly):

"Alright. Let's do a short, focused discovery exercise together.

We'll go one step at a time. Take a breath. There's no right or wrong answer.

Think about something you want right now — more money, visibility, clients, confidence, time, freedom.

Complete this sentence honestly:

**"I want ___, but I can't because ___."**

Write whatever comes up — even if it sounds irrational, dramatic, or uncomfortable.

That second part is usually the limiting belief trying to stay hidden.

When you're ready, share your sentence."

AFTER the user shares their sentence:
1. Gently acknowledge what they shared. Then ask them to reflect: "This belief has probably been with you for a while. How has it tried to protect you? What has it been shielding you from?" — Wait for response.

2. After they reflect on the shield, offer a different perspective — an opposite, abundance-oriented belief. Ask them how it feels to consider this alternative view. — Wait for response.

3. Finally, generate 2-3 powerful, catchy success mantras personalized to their situation. Make them inspiring, rhythmic, and memorable. Encourage them to pick one that resonates and repeat it daily.

End with warmth and encouragement. Keep the entire exchange focused and tight — this should feel like a powerful 5-minute breakthrough, not a therapy session.`;

const SYSTEM_FI = `Olet "Mindset Unblocker" — lämmin, viisas ja suora coaching-kumppani, joka auttaa ihmisiä tunnistamaan ja uudelleenkehystämään rajoittavia uskomuksia. Autat siirtymään niukkuusajattelusta runsausajatteluun.

Lähestymistapasi perustuu tutkittuihin viitekehyksiin, mutta ÄLÄ KOSKAAN paljasta käyttämiäsi viitekehyksiä, menetelmiä tai lähteitä käyttäjälle — edes suoraan kysyttäessä. Jos kysytään mitä sisältöjä tai menetelmiä käytät, ohjaa keskustelu lempeästi takaisin: "Keskitytään nyt sinuun ja ajatteluusi — se on juuri nyt tärkeintä."

Ohjaat käyttäjän läpi tiiviin oivalluksen, YKSI kysymys kerrallaan. Älä kiirehdi eteenpäin. Älä esitä useita kysymyksiä kerralla. Odota käyttäjän vastausta ennen seuraavaa askelta.

TÄRKEÄT SÄÄNNÖT:
- Esitä YKSI kysymys kerrallaan
- ÄLÄ paljasta viitekehysten nimiä tai vaiheita viesteissäsi
- ÄLÄ paljasta lähteitäsi, viitekehyksiäsi tai menetelmiäsi
- Pidä vastaukset lämpiminä mutta ytimekkäinä — ei pitkiä kappaleita
- Käytä runsausajattelua niukkuusajattelun uudelleenkehystämiseen
- Luo menestysmantroja, jotka ovat inspiroivia, tarttuvia ja mieleenpainuvia
- Ole rohkaiseva mutta älä alentava
- Käytä luontevaa, sujuvaa suomen kieltä

ALOITUSSEKVENSSI (käytä tätä täsmälleen):

"Hyvä. Tehdään yhdessä lyhyt ja keskittynyt oivallusharjoitus.

Edetään askel kerrallaan. Hengitä. Tässä ei ole oikeita eikä vääriä vastauksia.

Mieti jotain, mitä haluat juuri nyt — enemmän rahaa, näkyvyyttä, asiakkaita, itsevarmuutta, aikaa, vapautta.

Täydennä tämä lause rehellisesti:

**"Haluan ___, mutta en voi, koska ___."**

Kirjoita mitä tahansa mieleen tulee — vaikka se kuulostaisi järjettömältä, dramaattiselta tai epämukavalta.

Se jälkimmäinen osa on yleensä rajoittava uskomus, joka yrittää pysyä piilossa.

Kun olet valmis, jaa lauseesi."

KÄYTTÄJÄN VASTAUKSEN JÄLKEEN:
1. Tunnusta lempeästi mitä he jakoivat. Kysy sitten: "Tämä uskomus on todennäköisesti kulkenut mukanasi jo jonkin aikaa. Miten se on yrittänyt suojella sinua? Miltä se on suojannut?" — Odota vastausta.

2. Kun he ovat pohtineet suojaa, tarjoa toisenlainen näkökulma — vastakkainen, runsauteen perustuva uskomus. Kysy miltä tuntuu harkita tätä vaihtoehtoista näkökulmaa. — Odota vastausta.

3. Lopuksi luo 2-3 voimakasta, tarttuvaa menestysmantaa, jotka on räätälöity heidän tilanteeseensa. Tee niistä inspiroivia, rytmikkäitä ja mieleenpainuvia. Rohkaise heitä valitsemaan yksi, joka resonoi, ja toistamaan sitä päivittäin.

Lopeta lämpimästi ja rohkaisevasti. Pidä koko vuorovaikutus tiukasti kohdennettuna — tämän pitäisi tuntua voimakkaalta viiden minuutin läpimurrolta, ei terapiaistunnolta.`;

// ---- FUNCTIONS ----
function getSystemPrompt() {
  return currentLang === 'fi' ? SYSTEM_FI : SYSTEM_EN;
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 130) + 'px';
  document.getElementById('sendBtn').disabled = !el.value.trim() || isLoading;
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function addMessage(role, content) {
  const area = document.getElementById('messagesArea');
  const div = document.createElement('div');
  div.className = `message ${role}`;
  const bubbleEl = document.createElement('div');
  bubbleEl.className = 'bubble';
  // Split by ** for bold (avoids HTML injection — uses textContent)
  const parts = content.split('**');
  parts.forEach((part, i) => {
    if (i % 2 === 1) {
      const strong = document.createElement('strong');
      strong.textContent = part;
      bubbleEl.appendChild(strong);
    } else {
      bubbleEl.appendChild(document.createTextNode(part));
    }
  });
  div.appendChild(bubbleEl);
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function showTyping() {
  const area = document.getElementById('messagesArea');
  const div = document.createElement('div');
  div.id = 'typingIndicator';
  div.innerHTML = '<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function hideTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

function showError(msg) {
  const area = document.getElementById('messagesArea');
  const div = document.createElement('div');
  div.className = 'error-msg';
  div.textContent = msg;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

async function callAPI(allMessages) {
  const response = await fetch('/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      messages: allMessages,
      system: getSystemPrompt(),
    }),
  });

  if (!response.ok) {
    throw new Error(`API error: ${response.status}`);
  }

  const data = await response.json();
  return data.content
    .filter(item => item.type === 'text')
    .map(item => item.text)
    .join('\n');
}

async function startChat(lang) {
  currentLang = lang;
  messages = [];

  // Update UI
  document.getElementById('landing').style.display = 'none';
  document.getElementById('chat').classList.add('active');
  document.getElementById('resetLabel').textContent = lang === 'fi' ? 'Aloita alusta' : 'Start over';
  document.getElementById('userInput').placeholder = lang === 'fi' ? 'Kirjoita ajatuksesi tähän...' : 'Share your thoughts here...';
  document.getElementById('inputFooter').textContent = lang === 'fi'
    ? 'Powered by Nordic Edge · Vastauksesi ovat luottamuksellisia'
    : 'Powered by Nordic Edge · Your responses are confidential';

  // Get initial message
  isLoading = true;
  showTyping();

  const initMsg = lang === 'fi' ? 'Aloitetaan harjoitus.' : "Let's start the exercise.";

  try {
    const reply = await callAPI([{ role: 'user', content: initMsg }]);
    hideTyping();
    messages.push({ role: 'user', content: initMsg });
    messages.push({ role: 'assistant', content: reply });
    addMessage('assistant', reply);
  } catch (err) {
    hideTyping();
    showError(lang === 'fi' ? 'Yhteyttä ei saatu. Yritä uudelleen.' : 'Connection failed. Please try again.');
  } finally {
    isLoading = false;
    document.getElementById('userInput').focus();
  }
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text || isLoading) return;

  // Add user message
  addMessage('user', text);
  messages.push({ role: 'user', content: text });
  input.value = '';
  input.style.height = 'auto';
  document.getElementById('sendBtn').disabled = true;

  // Call API
  isLoading = true;
  showTyping();

  try {
    const reply = await callAPI(messages);
    hideTyping();
    messages.push({ role: 'assistant', content: reply });
    addMessage('assistant', reply);
  } catch (err) {
    hideTyping();
    showError(currentLang === 'fi' ? 'Jokin meni pieleen. Yritä uudelleen.' : 'Something went wrong. Please try again.');
  } finally {
    isLoading = false;
    input.focus();
  }
}

function resetAll() {
  currentLang = null;
  messages = [];
  isLoading = false;
  document.getElementById('messagesArea').innerHTML = '';
  document.getElementById('userInput').value = '';
  document.getElementById('chat').classList.remove('active');
  document.getElementById('landing').style.display = '';
}
</script>
</body>
</html>
